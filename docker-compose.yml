services:
  mongodb:
    image: mongo:8.0
    container_name: guestbook-db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - guestbook-net

  backend:
    build: ./backend
    container_name: guestbook-backend
    networks:
      guestbook-net:
        aliases:
          - backend
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SPRING_MONGODB_URI: mongodb://guestbook-db:27017/guestbook
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build: ./frontend
    container_name: guestbook-frontend
    networks:
      - guestbook-net
    depends_on:
      - backend
    environment:
      - VITE_API_URL=${VITE_API_URL}

  gateway:
    image: nginx:alpine
    container_name: guestbook-gateway
    networks:
      - guestbook-net
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
networks:
  guestbook-net:
    driver: bridge
