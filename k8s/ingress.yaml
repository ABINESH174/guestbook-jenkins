apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: guestbook-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # This tells Nginx to be strict with the slash
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - http:
      paths:
      - path: /api/.* # Updated: Catch everything starting with /api/
        pathType: ImplementationSpecific
        backend:
          service:
            name: backend-service
            port:
              number: 8080
      - path: /api      # Catch exactly /api
        pathType: Exact
        backend:
          service:
            name: backend-service
            port:
              number: 8080
      - path: /         # Catch-all for React
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
